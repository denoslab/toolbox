
services:
  app:
    image: python:3.8-slim  # Use a public image from Docker Hub (Python 3.8)
    stdin_open: true         # Keep the stdin open for interactive sessions
    tty: true                # Allocate a pseudo-TTY
    command: ["/bin/zsh"]    # Command to run (you can change this if needed)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Mount the Docker socket
    network_mode: "host"      # Use the host network (adjust if needed)
    environment:
      - ENV=development      # Set an environment variable if needed
