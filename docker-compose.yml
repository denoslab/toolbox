version: '3.8'

services:
  app:
    image: python:3.8-slim
    stdin_open: true
    tty: true
    command: ["/bin/bash"]    # Use bash instead of zsh
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Mount Docker socket
    network_mode: "host"      # Use host network (adjust if needed)
    environment:
      - ENV=development      # Set environment variable (modify if needed)
