version: '3.8'

services:
  portainer:
    image: portainer/portainer-ce
    container_name: toolbox_container
    ports:
      - "9000:9000"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data # Add this line to persist Portainer
    restart: always

volumes:
  portainer_data:


